name: Deploy Bot Stack
on:
  workflow_dispatch:
permissions:
  contents: read
env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f
jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          repository: hanzoai/universe
          token: ${{ secrets.GH_PAT }}
          sparse-checkout: infra/k8s/bot
      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - run: doctl kubernetes cluster kubeconfig save "$HANZO_CLUSTER_ID"

      - name: Fix gateway (single replica for in-memory registry)
        run: |
          echo "=== Scale gateway to 1 replica (in-memory registry requires single instance) ==="
          kubectl scale deploy/bot-gateway -n hanzo --replicas=1
          sleep 5

          echo "=== Delete any non-ready gateway pods ==="
          kubectl get pods -n hanzo -l app=bot-gateway --no-headers | while read name ready status rest; do
            if [ "$ready" != "1/1" ]; then
              echo "Deleting non-ready pod $name"
              kubectl delete pod -n hanzo "$name" --grace-period=0 --force || true
            fi
          done
          sleep 10

          echo ""
          echo "=== Gateway pods after fix ==="
          kubectl get pods -n hanzo -l app=bot-gateway -o wide

      - name: Delete stale provisioned bot pods
        run: |
          echo "=== Cleaning up stale provisioned agent pods ==="
          # Delete agent-cloud pods that are orphaned (provisioned by playground but not connected)
          kubectl get pods -n hanzo -o name | grep 'agent-cloud-' | while read pod; do
            echo "Deleting orphaned $pod"
            kubectl delete "$pod" -n hanzo --grace-period=10 || true
          done

      - name: Restart cloud-agent to force gateway reconnection
        run: |
          echo "=== Restart cloud-agent ==="
          kubectl rollout restart deploy/cloud-agent -n hanzo
          kubectl rollout status deploy/cloud-agent -n hanzo --timeout=120s || true

          echo ""
          echo "=== Wait for node to register ==="
          sleep 15

      - name: Verify everything
        run: |
          echo "=== Pods ==="
          kubectl get pods -n hanzo -l 'app in (bot-gateway,operative,cloud-agent,hanzo-playground)' -o wide

          echo ""
          echo "=== Ingresses ==="
          kubectl get ingress -n hanzo bot-gateway-ingress bot-gateway-ws hanzo-playground -o wide 2>/dev/null || true

          echo ""
          echo "=== Gateway health ==="
          kubectl exec -n hanzo deploy/bot-gateway -c bot-gateway -- curl -s http://localhost:18789/health

          echo ""
          echo "=== Internal WS test ==="
          kubectl exec -n hanzo deploy/cloud-agent -c cloud-agent -- timeout 5 node -e "
            const ws = new (require('ws'))('ws://bot-gateway:80/');
            ws.on('open', () => { console.log('WS OPEN'); ws.close(); process.exit(0); });
            ws.on('error', e => { console.log('WS ERROR:', e.message); process.exit(1); });
            setTimeout(() => { console.log('WS TIMEOUT'); process.exit(1); }, 4000);
          " 2>&1

          echo ""
          echo "=== Gateway logs (last 15) ==="
          kubectl logs -n hanzo deploy/bot-gateway -c bot-gateway --tail=15

          echo ""
          echo "=== Cloud-agent logs (last 15) ==="
          kubectl logs -n hanzo deploy/cloud-agent -c cloud-agent --tail=15

          echo ""
          echo "=== Node registry ==="
          kubectl exec -n hanzo deploy/bot-gateway -c bot-gateway -- curl -s http://localhost:18789/__bot__/api/v1/nodes 2>/dev/null | python3 -c "
          import sys, json
          try:
            data = json.loads(sys.stdin.read())
            if isinstance(data, list):
              for n in data:
                print(f'  {n.get(\"id\",\"?\")} status={n.get(\"status\",\"?\")} connected={n.get(\"connected\",\"?\")}')
            elif isinstance(data, dict) and 'nodes' in data:
              for n in data['nodes']:
                print(f'  {n.get(\"id\",\"?\")} status={n.get(\"status\",\"?\")} connected={n.get(\"connected\",\"?\")}')
            else:
              print(json.dumps(data, indent=2)[:500])
          except:
            print(sys.stdin.read()[:500] if hasattr(sys.stdin, 'read') else 'parse error')
          " 2>/dev/null || echo "Cannot get nodes"
