name: K8s Debug
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"
      - name: Check pod status
        run: |
          echo "=== Cloud-agent pods ==="
          kubectl get pods -n hanzo -l app=cloud-agent -o wide

          echo ""
          echo "=== Operative pods ==="
          kubectl get pods -n hanzo -l app=operative -o wide

          echo ""
          echo "=== Describe cloud-agent pod ==="
          kubectl describe pod -n hanzo -l app=cloud-agent 2>&1 | tail -20

          echo ""
          echo "=== Cloud-agent logs (if available) ==="
          kubectl logs -n hanzo -l app=cloud-agent -c cloud-agent --tail=15 2>&1 | head -20
          echo "---"
          kubectl logs -n hanzo -l app=cloud-agent -c operative --tail=5 2>&1 | head -10
