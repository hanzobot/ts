name: K8s Debug
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"

      - name: Remove gw-bot-root-rewrite from ingress-routes
        run: |
          echo "=== 1. Remove the root path rewrite router ==="
          kubectl get configmap ingress-routes -n hanzo -o jsonpath='{.data.routes\.yaml}' > /tmp/routes.yaml

          python3 << 'PYEOF'
          import yaml

          with open("/tmp/routes.yaml") as f:
              data = yaml.safe_load(f)

          routers = data.get("http", {}).get("routers", {})

          # Remove the gw-hanzo-bot-root router that rewrites / to /health
          if "gw-hanzo-bot-root" in routers:
              del routers["gw-hanzo-bot-root"]
              print("Deleted gw-hanzo-bot-root router (was rewriting / to /health)")

          # Also remove the gw-bot-root-rewrite middleware
          middlewares = data.get("http", {}).get("middlewares", {})
          if "gw-bot-root-rewrite" in middlewares:
              del middlewares["gw-bot-root-rewrite"]
              print("Deleted gw-bot-root-rewrite middleware")

          # Verify gw-hanzo-bot router still exists without rewrite
          if "gw-hanzo-bot" in routers:
              print(f"Kept gw-hanzo-bot router: {routers['gw-hanzo-bot']}")

          with open("/tmp/routes-fixed.yaml", "w") as f:
              yaml.dump(data, f, default_flow_style=False, allow_unicode=True)
          PYEOF

          echo ""
          echo "=== 2. Apply fixed ConfigMap ==="
          kubectl create configmap ingress-routes -n hanzo \
            --from-file=routes.yaml=/tmp/routes-fixed.yaml \
            --dry-run=client -o yaml | kubectl apply -f -

          echo ""
          echo "=== 3. Restart hanzo-ingress ==="
          kubectl rollout restart daemonset/hanzo-ingress -n hanzo
          sleep 20

          echo ""
          echo "=== 4. Test WS externally ==="
          echo "Health check (should work):"
          curl -sk -H "Host: gw.hanzo.bot" "https://64.225.91.229/health" 2>&1 | head -3
          echo ""
          echo "WebSocket upgrade test:"
          timeout 5 curl -sNi -H "Host: gw.hanzo.bot" \
            -H "Upgrade: websocket" -H "Connection: Upgrade" \
            -H "Sec-WebSocket-Version: 13" -H "Sec-WebSocket-Key: dGhlIHNhbXBsZSBub25jZQ==" \
            "https://64.225.91.229/" 2>&1 | head -10 || echo "WS curl done"

          echo ""
          echo "=== 5. Internal WS test ==="
          kubectl exec -n hanzo deploy/cloud-agent -- node -e "
            const ws = new (require('ws'))('ws://bot-gateway:80/');
            ws.on('open', () => { console.log('WS OPEN'); });
            ws.on('message', (d) => { console.log('MSG:', d.toString().substring(0, 80)); ws.close(); process.exit(0); });
            ws.on('error', (e) => { console.log('ERR:', e.message); process.exit(1); });
            setTimeout(() => { console.log('TIMEOUT'); process.exit(1); }, 5000);
          " 2>&1 | head -5
