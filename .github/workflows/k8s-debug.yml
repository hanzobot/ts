name: K8s Debug
on:
  workflow_dispatch:
permissions:
  contents: read
env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f
jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - run: doctl kubernetes cluster kubeconfig save "$HANZO_CLUSTER_ID"
      - name: Clean restart everything
        run: |
          echo "===== 1. Restart bot-gateway (clears all stale connections) ====="
          kubectl rollout restart deploy/bot-gateway -n hanzo
          kubectl rollout status deploy/bot-gateway -n hanzo --timeout=120s

          echo ""
          echo "===== 2. Restart cloud-agent (will reconnect to fresh gateway) ====="
          kubectl rollout restart deploy/cloud-agent -n hanzo
          kubectl rollout status deploy/cloud-agent -n hanzo --timeout=180s || echo "Timed out (operative image pull)"

          echo ""
          echo "===== 3. Wait for connections to establish ====="
          sleep 15

          echo ""
          echo "===== 4. Status check ====="
          echo "Pods:"
          kubectl get pods -n hanzo | grep -iE "bot-gateway|cloud-agent|operative|playground"
          echo ""
          echo "Gateway health:"
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 "http://bot-gateway:80/health" 2>&1
          echo ""
          echo "Cloud-agent logs:"
          kubectl logs -n hanzo -l app=cloud-agent -c cloud-agent --tail=8 2>&1 | head -10
          echo ""
          echo "Nodes registered:"
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 "http://hanzo-playground:8080/api/v1/nodes" 2>&1 | python3 -c "
          import sys, json
          data = json.loads(sys.stdin.read())
          nodes = data if isinstance(data, list) else data.get('nodes', data.get('data', []))
          print(f'Total: {len(nodes)}')
          for n in nodes:
            print(f'  {n.get(\"id\",\"?\")}')
          " 2>/dev/null
          echo ""
          echo "External WS:"
          timeout 3 curl -sNi -k -H "Host: gw.hanzo.bot" -H "Upgrade: websocket" -H "Connection: Upgrade" -H "Sec-WebSocket-Version: 13" -H "Sec-WebSocket-Key: dGhlIHNhbXBsZSBub25jZQ==" "https://64.225.91.229/" 2>&1 | head -3 || true
