name: K8s Debug
on:
  workflow_dispatch:
permissions:
  contents: read
env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f
jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - run: doctl kubernetes cluster kubeconfig save "$HANZO_CLUSTER_ID"
      - run: |
          kubectl set env deploy/hanzo-playground -n hanzo ANTHROPIC_API_KEY- 2>/dev/null || true
          kubectl set env deploy/hanzo-playground -n hanzo --from=secret/playground-secrets --keys=ANTHROPIC_API_KEY
          kubectl rollout status deploy/hanzo-playground -n hanzo --timeout=120s
          POD=$(kubectl get pods -n hanzo -l app=hanzo-playground -o jsonpath='{.items[0].metadata.name}')
          kubectl exec -n hanzo "$POD" -- env | grep ANTHROPIC | sed 's/=.\{8\}.*/=<set>/'
