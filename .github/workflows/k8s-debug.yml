name: K8s Debug
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"

      - name: Add ANTHROPIC_API_KEY to playground-secrets and restart
        run: |
          echo "=== 1. Copy ANTHROPIC_API_KEY from bot-secrets to playground-secrets ==="
          AKEY=$(kubectl get secret bot-secrets -n hanzo -o jsonpath='{.data.ANTHROPIC_API_KEY}')
          echo "Key exists: $([ -n "$AKEY" ] && echo yes || echo no)"

          # Check if playground-secrets already has it
          EXISTING=$(kubectl get secret playground-secrets -n hanzo -o jsonpath='{.data.ANTHROPIC_API_KEY}' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            echo "ANTHROPIC_API_KEY already in playground-secrets"
          else
            echo "Adding ANTHROPIC_API_KEY to playground-secrets..."
            kubectl patch secret playground-secrets -n hanzo --type=json \
              -p "[{\"op\":\"add\",\"path\":\"/data/ANTHROPIC_API_KEY\",\"value\":\"$AKEY\"}]"
          fi

          echo ""
          echo "=== 2. Apply updated agents-control-plane deployment ==="
          # Checkout universe and apply
          git clone --depth 1 --sparse https://${{ secrets.UNIVERSE_DISPATCH_TOKEN }}@github.com/hanzoai/universe.git /tmp/universe
          cd /tmp/universe && git sparse-checkout set infra/k8s/bot
          kubectl apply -f /tmp/universe/infra/k8s/bot/agents-control-plane.yaml

          echo ""
          echo "=== 3. Restart playground ==="
          kubectl rollout restart deploy/hanzo-playground -n hanzo
          kubectl rollout status deploy/hanzo-playground -n hanzo --timeout=120s || echo "Timed out"

          echo ""
          echo "=== 4. Verify playground has ANTHROPIC_API_KEY ==="
          kubectl exec -n hanzo deploy/hanzo-playground -- env 2>/dev/null | grep ANTHROPIC | sed 's/=.\{8\}.*/=<set>/' || echo "Can't verify"

          echo ""
          echo "=== 5. Gateway + playground health ==="
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 "http://bot-gateway:80/health" 2>&1 | head -3
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 "http://hanzo-playground:8080/api/v1/health" 2>&1 | head -3
