name: K8s Debug
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"
      - name: Fix bot-gateway with hanzo-bot.mjs and --bind lan
        run: |
          echo "=== Fix command to: node hanzo-bot.mjs gateway --allow-unconfigured --bind lan ==="
          kubectl patch deploy bot-gateway -n hanzo --type json \
            -p '[{"op":"replace","path":"/spec/template/spec/containers/0/command","value":["node","hanzo-bot.mjs","gateway","--allow-unconfigured","--bind","lan"]}]'

          echo ""
          echo "=== Scale 0 then 1 ==="
          kubectl scale deploy/bot-gateway -n hanzo --replicas=0
          sleep 10
          kubectl scale deploy/bot-gateway -n hanzo --replicas=1

          echo ""
          echo "=== Wait up to 5 min ==="
          kubectl rollout status deploy/bot-gateway -n hanzo --timeout=300s || echo "Timed out"

          echo ""
          echo "=== Check logs ==="
          kubectl logs -n hanzo -l app=bot-gateway --tail=10 2>&1 | grep -iE "listen|bind|0\.0\.0\.0|lan|error|fatal" | head -5 || echo "No relevant logs yet"

          echo ""
          echo "=== Test /health ==="
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 "http://bot-gateway:80/health" 2>&1 | head -3 || echo "Health check failed"

          echo ""
          echo "=== Test via Traefik ==="
          curl -sk --connect-timeout 5 --resolve "gw.hanzo.bot:443:64.225.91.229" "https://gw.hanzo.bot/health" -D - 2>&1 | head -8
