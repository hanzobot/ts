name: K8s Debug
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"
      - name: Patch bot-gateway env to use OPENCLAW_CONFIG_PATH
        run: |
          echo "=== Add OPENCLAW_CONFIG_PATH env var (alias for BOT_CONFIG_PATH) ==="
          kubectl set env deploy/bot-gateway -n hanzo OPENCLAW_CONFIG_PATH=/etc/bot/bot.json

          echo ""
          echo "=== Wait for rollout ==="
          kubectl rollout status deploy/bot-gateway -n hanzo --timeout=300s || echo "Timed out"

          echo ""
          echo "=== Check pod status ==="
          kubectl get pods -n hanzo -l app=bot-gateway -o wide

          echo ""
          echo "=== Check logs ==="
          kubectl logs -n hanzo -l app=bot-gateway --tail=20 2>&1 | head -30

          echo ""
          echo "=== Health check ==="
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 "http://bot-gateway:80/health" 2>&1 | head -5 || echo "Not ready"
