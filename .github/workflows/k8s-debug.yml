name: K8s Debug
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"
      - name: Dump gateway-config and find redirect
        run: |
          echo "=== Full gateway-config ==="
          kubectl get configmap gateway-config -n hanzo -o jsonpath='{.data}' 2>&1 | python3 -c "
          import sys, json
          data = json.loads(sys.stdin.read())
          for key, val in data.items():
            print(f'--- {key} ---')
            try:
              parsed = json.loads(val)
              print(json.dumps(parsed, indent=2))
            except:
              print(val)
          " 2>/dev/null || kubectl get configmap gateway-config -n hanzo -o yaml
