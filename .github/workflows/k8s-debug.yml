name: K8s Debug
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"
      - name: Fix bot-gateway bind to network
        run: |
          echo "=== Current bot-gateway container args ==="
          kubectl get deploy bot-gateway -n hanzo -o jsonpath='{.spec.template.spec.containers[0].command}' 2>/dev/null
          echo ""
          kubectl get deploy bot-gateway -n hanzo -o jsonpath='{.spec.template.spec.containers[0].args}' 2>/dev/null
          echo ""

          echo ""
          echo "=== Add OPENCLAW_BIND=lan env var ==="
          kubectl set env deploy/bot-gateway -n hanzo "OPENCLAW_BIND=lan"

          echo ""
          echo "=== Restart bot-gateway ==="
          kubectl rollout restart deploy/bot-gateway -n hanzo
          kubectl rollout status deploy/bot-gateway -n hanzo --timeout=120s || echo "Timed out"

          echo ""
          echo "=== Test connectivity ==="
          sleep 10
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 "http://bot-gateway:80/" 2>&1 | head -3 || echo "Still failing on port 80"

          echo ""
          echo "=== Check new logs ==="
          kubectl logs -n hanzo -l app=bot-gateway --tail=5 2>&1 | grep -i "listen\|bind\|host" | head -5
