name: K8s Debug
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"
      - name: Find app.hanzo.bot redirect source
        run: |
          echo "=== All Traefik IngressRoutes ==="
          kubectl get ingressroute -A -o yaml 2>/dev/null | grep -B3 -A20 "app\.hanzo\|hanzo\.bot" || echo "No matching IngressRoutes"

          echo ""
          echo "=== Traefik Middlewares ==="
          kubectl get middleware -A -o yaml 2>/dev/null | head -60 || echo "No middlewares"

          echo ""
          echo "=== Traefik redirectregex/redirectscheme ==="
          kubectl get middleware -A -o yaml 2>/dev/null | grep -B5 -A10 "redirect\|hanzo\.bot" || echo "No redirects"

          echo ""
          echo "=== Check for hanzo-bot-site IngressRoute ==="
          kubectl get ingressroute -A 2>/dev/null | grep -i "bot\|site\|hanzo" || echo "No bot IngressRoutes"

          echo ""
          echo "=== Check if there are multiple ingresses claiming app.hanzo.bot ==="
          kubectl get ingress -A -o yaml 2>/dev/null | grep -B5 "app\.hanzo\.bot" || echo "No matches"

          echo ""
          echo "=== Traefik routers (HTTP config) ==="
          TRAEFIK_POD=$(kubectl get pods -n hanzo -l app.kubernetes.io/name=traefik -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")
          if [ -z "$TRAEFIK_POD" ]; then
            TRAEFIK_POD=$(kubectl get pods -A -l app.kubernetes.io/name=traefik -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")
            TRAEFIK_NS=$(kubectl get pods -A -l app.kubernetes.io/name=traefik -o jsonpath='{.items[0].metadata.namespace}' 2>/dev/null || echo "")
          else
            TRAEFIK_NS=hanzo
          fi
          if [ -n "$TRAEFIK_POD" ]; then
            echo "Traefik pod: $TRAEFIK_NS/$TRAEFIK_POD"
            kubectl exec -n "$TRAEFIK_NS" "$TRAEFIK_POD" -- wget -qO- http://127.0.0.1:8080/api/http/routers 2>/dev/null | python3 -c "import sys,json; [print(r['rule'],'->',r.get('service','?')) for r in json.loads(sys.stdin.read()) if 'app.hanzo' in r.get('rule','') or 'hanzo.bot' in r.get('rule','')]" 2>/dev/null || echo "Could not query Traefik API"
          else
            echo "No Traefik pod found by label"
            kubectl get pods -A | grep traefik
          fi

          echo ""
          echo "=== Verify: direct test playground.hanzo.bot vs app.hanzo.bot ==="
          echo "playground.hanzo.bot/api/v1/health:"
          curl -sk -H "Host: playground.hanzo.bot" "https://64.225.91.229/api/v1/health" 2>&1 | head -3
          echo ""
          echo "app.hanzo.bot/api/v1/health:"
          curl -skI -H "Host: app.hanzo.bot" "https://64.225.91.229/api/v1/health" 2>&1 | head -5
