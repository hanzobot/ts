name: K8s Debug
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"

      - name: Fix cloud-agent insecure ws
        run: |
          echo "=== Allow insecure WS for in-cluster communication ==="
          kubectl set env deploy/cloud-agent -n hanzo OPENCLAW_ALLOW_INSECURE_PRIVATE_WS=1

          echo ""
          echo "=== Wait for rollout ==="
          kubectl rollout status deploy/cloud-agent -n hanzo --timeout=120s || echo "Timed out"

          echo ""
          echo "=== Check logs ==="
          sleep 15
          kubectl logs -n hanzo -l app=cloud-agent --tail=30 2>&1 | head -40

          echo ""
          echo "=== Check gateway connected nodes ==="
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 "http://bot-gateway:80/health" 2>&1 | head -3

          echo ""
          echo "=== Verify app.hanzo.bot ==="
          curl -sk -H "Host: app.hanzo.bot" "https://64.225.91.229/api/v1/health" 2>&1 | head -3
