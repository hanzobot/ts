name: K8s Debug
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"

      - name: Check deployed images
        run: |
          echo "=== Playground deployed image ==="
          kubectl get pods -n hanzo -l app=hanzo-playground -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.spec.containers[0].image}{"\t"}{.status.containerStatuses[0].imageID}{"\n"}{end}'

          echo ""
          echo "=== Playground image digest ==="
          kubectl get pods -n hanzo -l app=hanzo-playground -o jsonpath='{.items[0].status.containerStatuses[0].imageID}' | sed 's/.*@//'

          echo ""
          echo "=== Latest image from GHCR ==="
          # Check the latest tag on ghcr
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=10 "https://ghcr.io/v2/hanzoai/playground/tags/list" 2>&1 | head -3 || echo "Can't query GHCR directly"

          echo ""
          echo "=== Playground pod age + restart count ==="
          kubectl get pods -n hanzo -l app=hanzo-playground -o wide --show-labels | head -5

          echo ""
          echo "=== Bot gateway deployed image ==="
          kubectl get pods -n hanzo -l app=bot-gateway -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.spec.containers[0].image}{"\t"}{.status.containerStatuses[0].imageID}{"\n"}{end}'

          echo ""
          echo "=== Cloud-agent deployed image ==="
          kubectl get pods -n hanzo -l app=cloud-agent -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{range .status.containerStatuses[*]}{.name}={.imageID}{"\t"}{end}{"\n"}{end}'

          echo ""
          echo "=== Check if playground image was updated after our commit ==="
          echo "Pod creation times:"
          kubectl get pods -n hanzo -l app=hanzo-playground -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.metadata.creationTimestamp}{"\n"}{end}'
          echo ""
          echo "Deploy last update:"
          kubectl get deploy hanzo-playground -n hanzo -o jsonpath='{.metadata.annotations.deployment\.kubernetes\.io/revision}' && echo " (revision)"
          kubectl get deploy hanzo-playground -n hanzo -o jsonpath='{.spec.template.metadata.annotations}' 2>/dev/null && echo ""

          echo ""
          echo "=== Does the new image have ANTHROPIC_API_KEY provisioner code? ==="
          POD=$(kubectl get pods -n hanzo -l app=hanzo-playground -o jsonpath='{.items[0].metadata.name}')
          kubectl exec -n hanzo "$POD" -- grep -r "ANTHROPIC_API_KEY" /app/ 2>/dev/null | head -3 || kubectl exec -n hanzo "$POD" -- grep -r "AnthropicAPIKey" /app/ 2>/dev/null | head -3 || echo "Can't grep binary - checking env instead"
          kubectl exec -n hanzo "$POD" -- env 2>/dev/null | grep ANTHROPIC | sed 's/=.\{8\}.*/=<set>/' || echo "ANTHROPIC not in env"
