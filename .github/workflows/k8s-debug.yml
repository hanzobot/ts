name: K8s Debug
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"
      - name: Checkout universe
        uses: actions/checkout@v4
        with:
          repository: hanzoai/universe
          token: ${{ secrets.UNIVERSE_DISPATCH_TOKEN }}
          path: universe
          sparse-checkout: infra/k8s/bot
      - name: Delete and recreate bot-gateway from universe
        run: |
          echo "=== Delete existing bot-gateway deployment ==="
          kubectl delete deploy bot-gateway -n hanzo --ignore-not-found
          sleep 5

          echo ""
          echo "=== Apply fresh from universe ==="
          kubectl apply -f universe/infra/k8s/bot/deployment.yaml

          echo ""
          echo "=== Wait for rollout ==="
          kubectl rollout status deploy/bot-gateway -n hanzo --timeout=300s || echo "Timed out"

          echo ""
          echo "=== Check logs ==="
          kubectl logs -n hanzo -l app=bot-gateway --tail=5 2>&1 | head -10

          echo ""
          echo "=== Test ==="
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 "http://bot-gateway:80/health" 2>&1 | head -3 || echo "Not ready"
