name: K8s Debug
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"

      - name: Add ANTHROPIC_API_KEY to cloud-agent
        run: |
          echo "=== Add ANTHROPIC_API_KEY from bot-secrets to cloud-agent ==="
          kubectl set env deploy/cloud-agent -n hanzo \
            --from=secret/bot-secrets \
            --keys=ANTHROPIC_API_KEY

          echo ""
          echo "=== Also add HANZO_API_KEY for hanzo model routing ==="
          kubectl set env deploy/cloud-agent -n hanzo \
            --from=secret/bot-secrets \
            --keys=HANZO_API_KEY

          echo ""
          echo "=== Wait for rollout ==="
          kubectl rollout status deploy/cloud-agent -n hanzo --timeout=120s || echo "Timed out"

          echo ""
          echo "=== Check cloud-agent env has the keys ==="
          kubectl exec -n hanzo deploy/cloud-agent -c cloud-agent -- env 2>/dev/null | grep -E "ANTHROPIC_API_KEY|HANZO_API_KEY" | sed 's/=.*/=<set>/' || echo "Can't check env"

          echo ""
          echo "=== Cloud-agent logs ==="
          sleep 10
          kubectl logs -n hanzo -l app=cloud-agent -c cloud-agent --tail=15 2>&1 | head -20
