name: K8s Debug
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"
      - name: Check bot-gateway health
        run: |
          echo "=== bot-gateway pod details ==="
          kubectl describe pod -n hanzo -l app=bot-gateway 2>&1 | grep -E "State:|Ready|Restart|Image:|Port:|Container ID" | head -10

          echo ""
          echo "=== bot-gateway logs (last 30) ==="
          kubectl logs -n hanzo -l app=bot-gateway --tail=30 2>&1

          echo ""
          echo "=== bot-gateway env (listening ports) ==="
          kubectl exec -n hanzo deploy/bot-gateway -- env 2>&1 | grep -iE "PORT|HOST|LISTEN|BIND" | head -10 || echo "exec failed"

          echo ""
          echo "=== bot-gateway netstat ==="
          kubectl exec -n hanzo deploy/bot-gateway -- sh -c "ss -tlnp 2>/dev/null || netstat -tlnp 2>/dev/null || echo 'no ss/netstat'" 2>&1 | head -10 || echo "exec failed"
