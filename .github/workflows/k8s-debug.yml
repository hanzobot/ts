name: K8s Debug
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"

      - name: Fix cloud-agent with SHA-pinned operative
        run: |
          echo "=== 1. Get SHA-pinned operative image from playground config ==="
          OPERATIVE_IMAGE=$(kubectl get deploy hanzo-playground -n hanzo -o jsonpath='{range .spec.template.spec.containers[0].env[*]}{.name}={.value}{"\n"}{end}' | grep OPERATIVE_IMAGE | head -1 | cut -d= -f2-)
          echo "Operative image: $OPERATIVE_IMAGE"

          echo ""
          echo "=== 2. Check why pending - describe ==="
          kubectl describe pod -n hanzo -l app=cloud-agent 2>&1 | grep -E "Events:|Warning|FailedScheduling|Insufficient|node" | head -5

          echo ""
          echo "=== 3. Delete and recreate WITHOUT nodeSelector ==="
          kubectl delete deploy cloud-agent -n hanzo --ignore-not-found
          cat <<EOF | kubectl apply -f -
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: cloud-agent
            namespace: hanzo
            labels:
              app: cloud-agent
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: cloud-agent
            template:
              metadata:
                labels:
                  app: cloud-agent
              spec:
                imagePullSecrets:
                - name: ghcr-secret
                containers:
                - name: cloud-agent
                  image: ghcr.io/hanzoai/bot:latest
                  imagePullPolicy: IfNotPresent
                  command: ["node", "hanzo-bot.mjs", "node", "run", "--node-id", "cloud-agent-default", "--security", "full"]
                  env:
                  - name: BOT_GATEWAY_TOKEN
                    valueFrom:
                      secretKeyRef:
                        name: bot-secrets
                        key: BOT_GATEWAY_TOKEN
                  - name: ANTHROPIC_API_KEY
                    valueFrom:
                      secretKeyRef:
                        name: bot-secrets
                        key: ANTHROPIC_API_KEY
                        optional: true
                  - name: HANZO_API_KEY
                    valueFrom:
                      secretKeyRef:
                        name: bot-secrets
                        key: HANZO_API_KEY
                  - name: BOT_NODE_GATEWAY_URL
                    value: "ws://bot-gateway/v1/tunnel"
                  - name: AGENT_NODE_ID
                    value: "cloud-agent-default"
                  - name: PLAYGROUND_SERVER
                    value: "http://hanzo-playground.hanzo.svc:8080"
                  - name: AGENT_NODE_TYPE
                    value: "cloud"
                  - name: HOME
                    value: /home/node
                  - name: NODE_ENV
                    value: production
                  - name: OPENCLAW_ALLOW_INSECURE_PRIVATE_WS
                    value: "1"
                  - name: OPERATIVE_URL
                    value: "http://localhost:8501"
                  resources:
                    requests:
                      cpu: 100m
                      memory: 256Mi
                    limits:
                      cpu: "1"
                      memory: 2Gi
                - name: operative
                  image: "${OPERATIVE_IMAGE}"
                  imagePullPolicy: IfNotPresent
                  ports:
                  - containerPort: 8080
                    name: ui
                  - containerPort: 6080
                    name: vnc-web
                  - containerPort: 5900
                    name: vnc
                  - containerPort: 8501
                    name: streamlit
                  env:
                  - name: ANTHROPIC_API_KEY
                    valueFrom:
                      secretKeyRef:
                        name: bot-secrets
                        key: ANTHROPIC_API_KEY
                        optional: true
                  - name: WIDTH
                    value: "1280"
                  - name: HEIGHT
                    value: "800"
                  - name: DISPLAY_NUM
                    value: "1"
                  resources:
                    requests:
                      memory: "1Gi"
                      cpu: "500m"
                    limits:
                      memory: "4Gi"
                      cpu: "2000m"
          EOF

          echo ""
          echo "=== 4. Wait for rollout ==="
          kubectl rollout status deploy/cloud-agent -n hanzo --timeout=180s || echo "Timed out"

          echo ""
          echo "=== 5. Status ==="
          kubectl get pods -n hanzo -l app=cloud-agent -o wide

          echo ""
          echo "=== 6. Logs ==="
          sleep 10
          kubectl logs -n hanzo -l app=cloud-agent -c cloud-agent --tail=10 2>&1 | head -15
          echo "--- operative ---"
          kubectl logs -n hanzo -l app=cloud-agent -c operative --tail=5 2>&1 | head -10
