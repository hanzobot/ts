name: K8s Debug
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"
      - name: Check bot-gateway status and logs
        run: |
          echo "=== Pod status ==="
          kubectl get pods -n hanzo -l app=bot-gateway -o wide

          echo ""
          echo "=== Describe deployment ==="
          kubectl describe deploy/bot-gateway -n hanzo | tail -20

          echo ""
          echo "=== Logs from running pod ==="
          RUNNING_POD=$(kubectl get pods -n hanzo -l app=bot-gateway --field-selector=status.phase=Running -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")
          if [ -n "$RUNNING_POD" ]; then
            echo "Pod: $RUNNING_POD"
            kubectl logs -n hanzo "$RUNNING_POD" --tail=40 2>&1 | head -50
          else
            echo "No running pod found"
            kubectl logs -n hanzo -l app=bot-gateway --tail=40 2>&1 | head -50
          fi

          echo ""
          echo "=== Service endpoints ==="
          kubectl get endpoints bot-gateway -n hanzo

          echo ""
          echo "=== Health check ==="
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=10 "http://bot-gateway:80/health" 2>&1 | head -5 || echo "Health check failed"

          echo ""
          echo "=== Env vars on deployment ==="
          kubectl get deploy bot-gateway -n hanzo -o jsonpath='{range .spec.template.spec.containers[0].env[*]}{.name}={.value}{"\n"}{end}' 2>&1 | grep -E "CONFIG_PATH|BIND|BOT_CONFIG"
