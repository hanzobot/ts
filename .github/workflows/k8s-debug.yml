name: K8s Debug
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"
      - name: Debug bot backend
        run: |
          echo "=== bot-gateway svc ==="
          kubectl get svc bot-gateway -n hanzo -o yaml | grep -A 10 "ports:"

          echo ""
          echo "=== Test bot-gateway port 80 ==="
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 "http://bot-gateway:80/" 2>&1 | head -3 || echo "FAILED on 80"

          echo ""
          echo "=== Test bot-gateway port 18790 ==="
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 "http://bot-gateway:18790/" 2>&1 | head -3 || echo "FAILED on 18790"

          echo ""
          echo "=== Test hanzo-playground port 8080 ==="
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 "http://hanzo-playground:8080/" 2>&1 | head -3 || echo "FAILED on 8080"

          echo ""
          echo "=== Test gw.hanzo.bot via Traefik ==="
          curl -sk --connect-timeout 5 --resolve "gw.hanzo.bot:443:64.225.91.229" "https://gw.hanzo.bot/" -D - 2>&1 | head -8
