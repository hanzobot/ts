name: K8s Debug
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"
      - name: Fix bot-gateway bind via CLI flag
        run: |
          echo "=== Current container command/args ==="
          kubectl get deploy bot-gateway -n hanzo -o jsonpath='{.spec.template.spec.containers[0].command}'
          echo ""
          kubectl get deploy bot-gateway -n hanzo -o jsonpath='{.spec.template.spec.containers[0].args}'
          echo ""

          echo ""
          echo "=== Full container spec ==="
          kubectl get deploy bot-gateway -n hanzo -o jsonpath='{.spec.template.spec.containers[0]}' | python3 -m json.tool 2>/dev/null | grep -E "command|args|image" | head -5

          echo ""
          echo "=== Dockerfile CMD/ENTRYPOINT ==="
          kubectl exec -n hanzo deploy/bot-gateway -- cat /proc/1/cmdline 2>&1 | tr '\0' ' ' | head -1 || echo "Can't read cmdline"
