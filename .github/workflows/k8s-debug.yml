name: K8s Debug
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"
      - name: Dump ingress-routes ConfigMap
        run: |
          echo "=== ingress-routes ConfigMap ==="
          kubectl get configmap ingress-routes -n hanzo -o yaml

      - name: Fix cloud-agent gateway token
        run: |
          echo "=== Current cloud-agent env ==="
          kubectl get deploy cloud-agent -n hanzo -o jsonpath='{range .spec.template.spec.containers[0].env[*]}{.name}={.value}{"\n"}{end}'

          echo ""
          echo "=== Add GATEWAY_TOKEN env to cloud-agent ==="
          kubectl set env deploy/cloud-agent -n hanzo \
            GATEWAY_TOKEN_FROM_SECRET=true \
            --from=secret/bot-secrets \
            2>/dev/null || echo "set env from secret failed"

          echo ""
          echo "=== Alternative: patch directly ==="
          kubectl patch deploy cloud-agent -n hanzo --type=json -p '[
            {"op":"add","path":"/spec/template/spec/containers/0/env/-","value":{"name":"GATEWAY_TOKEN","valueFrom":{"secretKeyRef":{"name":"bot-secrets","key":"BOT_GATEWAY_TOKEN"}}}}
          ]' 2>/dev/null || echo "patch failed (may already exist)"

          echo ""
          echo "=== Wait for rollout ==="
          kubectl rollout status deploy/cloud-agent -n hanzo --timeout=120s || echo "Timed out"

          echo ""
          echo "=== Cloud-agent logs after restart ==="
          sleep 10
          kubectl logs -n hanzo -l app=cloud-agent --tail=20 2>&1 | head -30
