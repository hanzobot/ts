name: K8s Debug
on:
  workflow_dispatch:
permissions:
  contents: read
env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f
jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"
      - name: Fix bot ingresses to use Traefik
        run: |
          echo "=== Current bot-gateway-ws ingress class ==="
          kubectl get ingress bot-gateway-ws -n hanzo -o jsonpath='{.spec.ingressClassName}'
          echo ""

          echo "=== Patch bot-gateway-ws to use gateway class ==="
          kubectl patch ingress bot-gateway-ws -n hanzo --type merge \
            -p '{"spec":{"ingressClassName":"gateway"}}'

          echo "=== Patch hanzo-playground to use gateway class ==="
          kubectl patch ingress hanzo-playground -n hanzo --type merge \
            -p '{"spec":{"ingressClassName":"gateway"}}'

          echo "=== Patch bot-gateway to use gateway class ==="
          kubectl patch ingress bot-gateway -n hanzo --type merge \
            -p '{"spec":{"ingressClassName":"gateway"}}'

          echo "=== Patch bot-hub to use gateway class ==="
          kubectl patch ingress bot-hub -n hanzo --type merge \
            -p '{"spec":{"ingressClassName":"gateway"}}'

          echo ""
          echo "=== Verify ==="
          kubectl get ingress -n hanzo -o custom-columns='NAME:.metadata.name,CLASS:.spec.ingressClassName,HOSTS:.spec.rules[*].host' | grep -i "bot\|playground\|gateway-ws"

          echo ""
          echo "=== Test gw.hanzo.bot through Traefik LB ==="
          sleep 5
          curl -sk --connect-timeout 5 --resolve "gw.hanzo.bot:443:64.225.91.229" "https://gw.hanzo.bot/" -D - 2>&1 | head -10
