name: K8s Debug
on:
  workflow_dispatch:
permissions:
  contents: read
env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f
jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - run: doctl kubernetes cluster kubeconfig save "$HANZO_CLUSTER_ID"
      - name: Fix WS routing
        run: |
          echo "===== 1. Current gw.hanzo.bot ingresses ====="
          kubectl get ingress -n hanzo -o json | python3 -c "
          import sys, json
          for item in json.loads(sys.stdin.read()).get('items', []):
            for rule in item['spec'].get('rules', []):
              if 'gw.hanzo' in rule.get('host', ''):
                print(f'{item[\"metadata\"][\"name\"]} class={item[\"spec\"].get(\"ingressClassName\",\"?\")} -> {rule[\"http\"][\"paths\"][0][\"backend\"][\"service\"][\"name\"]}')
          "

          echo ""
          echo "===== 2. Check ingress-routes ConfigMap for gw.hanzo.bot ====="
          kubectl get configmap ingress-routes -n hanzo -o jsonpath='{.data.routes\.yaml}' | python3 -c "
          import yaml, sys
          data = yaml.safe_load(sys.stdin.read())
          for name, r in data.get('http', {}).get('routers', {}).items():
            if 'gw.hanzo' in r.get('rule', ''):
              print(f'Router {name}: rule={r[\"rule\"]} svc={r.get(\"service\")} tls={r.get(\"tls\")}')
          for name, s in data.get('http', {}).get('services', {}).items():
            if 'gw-hanzo' in name or 'bot-gateway' in name:
              print(f'Service {name}: {s}')
          "

          echo ""
          echo "===== 3. Test WS internally (via bot service) ====="
          kubectl exec -n hanzo deploy/cloud-agent -c cloud-agent -- node -e "
            const ws = new (require('ws'))('ws://bot-gateway:80/');
            ws.on('open', () => console.log('WS INTERNAL: OPEN'));
            ws.on('message', d => { console.log('MSG:', d.toString().substring(0,60)); ws.close(); process.exit(0); });
            ws.on('error', e => { console.log('ERR:', e.message); process.exit(1); });
            setTimeout(() => { console.log('TIMEOUT'); process.exit(1); }, 5000);
          " 2>&1 | head -5

          echo ""
          echo "===== 4. Restart hanzo-ingress to reload routes ====="
          kubectl rollout restart daemonset/hanzo-ingress -n hanzo
          sleep 15

          echo ""
          echo "===== 5. Test WS after ingress restart ====="
          timeout 3 curl -sNi -k -H "Host: gw.hanzo.bot" -H "Upgrade: websocket" -H "Connection: Upgrade" -H "Sec-WebSocket-Version: 13" -H "Sec-WebSocket-Key: dGhlIHNhbXBsZSBub25jZQ==" "https://64.225.91.229/" 2>&1 | head -5 || true
