name: K8s Debug
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"
      - name: Fix bot-gateway service endpoints
        run: |
          echo "=== Service selector ==="
          kubectl get svc bot-gateway -n hanzo -o jsonpath='{.spec.selector}' && echo ""

          echo ""
          echo "=== Pod labels ==="
          kubectl get pods -n hanzo -l app=bot-gateway --show-labels

          echo ""
          echo "=== EndpointSlice ==="
          kubectl get endpointslice -n hanzo -l kubernetes.io/service-name=bot-gateway -o yaml 2>/dev/null | head -40 || echo "No endpointslice found"

          echo ""
          echo "=== Deployment replicas ==="
          kubectl get deploy bot-gateway -n hanzo

          echo ""
          echo "=== Scale to 2 replicas ==="
          kubectl scale deploy/bot-gateway -n hanzo --replicas=2
          sleep 15

          echo ""
          echo "=== Pod status after scale ==="
          kubectl get pods -n hanzo -l app=bot-gateway -o wide

          echo ""
          echo "=== Endpoints after scale ==="
          kubectl get endpoints bot-gateway -n hanzo 2>/dev/null || true
          kubectl get endpointslice -n hanzo -l kubernetes.io/service-name=bot-gateway 2>/dev/null || true

          echo ""
          echo "=== Direct pod health check ==="
          POD_IP=$(kubectl get pods -n hanzo -l app=bot-gateway -o jsonpath='{.items[0].status.podIP}' 2>/dev/null)
          if [ -n "$POD_IP" ]; then
            echo "Pod IP: $POD_IP"
            kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 "http://${POD_IP}:18789/health" 2>&1 | head -5 || echo "Direct pod check failed"
          fi

          echo ""
          echo "=== Service health check ==="
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 "http://bot-gateway:80/health" 2>&1 | head -5 || echo "Service check failed"
