name: K8s Debug
on:
  workflow_dispatch:
permissions:
  contents: read
env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f
  GH_TOKEN: ${{ secrets.GH_PAT }}
jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - run: doctl kubernetes cluster kubeconfig save "$HANZO_CLUSTER_ID"

      - name: Full bot stack diagnostic
        run: |
          echo "===== 1. All bot-related deployments ====="
          kubectl get deploy -n hanzo bot-gateway operative cloud-agent hanzo-playground -o wide 2>/dev/null || true

          echo ""
          echo "===== 2. All bot-related pods ====="
          kubectl get pods -n hanzo -l 'app in (bot-gateway,operative,cloud-agent,hanzo-playground)' -o wide 2>/dev/null || true

          echo ""
          echo "===== 3. All bot-related services ====="
          kubectl get svc -n hanzo bot-gateway operative hanzo-playground -o wide 2>/dev/null || true

          echo ""
          echo "===== 4. All ingresses ====="
          kubectl get ingress -n hanzo -o wide 2>/dev/null || true

          echo ""
          echo "===== 5. Bot gateway logs (last 30) ====="
          kubectl logs -n hanzo deploy/bot-gateway -c bot-gateway --tail=30 2>/dev/null || echo "No logs"

          echo ""
          echo "===== 6. Cloud-agent logs (last 20) ====="
          kubectl logs -n hanzo deploy/cloud-agent -c cloud-agent --tail=20 2>/dev/null || echo "No logs"

          echo ""
          echo "===== 7. Playground logs (last 20) ====="
          kubectl logs -n hanzo deploy/hanzo-playground --tail=20 2>/dev/null || echo "No logs"

          echo ""
          echo "===== 8. Gateway env ====="
          kubectl exec -n hanzo deploy/bot-gateway -c bot-gateway -- env 2>/dev/null | grep -E '^(BOT_|HANZO_|NODE_|PLAYGROUND_|OPERATIVE_|KV_)' | sort || true

          echo ""
          echo "===== 9. Cloud-agent env ====="
          kubectl exec -n hanzo deploy/cloud-agent -c cloud-agent -- env 2>/dev/null | grep -E '^(ANTHROPIC_|HANZO_|GATEWAY_|BOT_|HOME)' | sort || true
          echo ""
          echo "===== 9b. Cloud-agent auth test ====="
          kubectl exec -n hanzo deploy/cloud-agent -c cloud-agent -- node -e "
            console.log('ANTHROPIC_API_KEY set:', !!process.env.ANTHROPIC_API_KEY, 'length:', (process.env.ANTHROPIC_API_KEY||'').length);
            console.log('HANZO_API_KEY set:', !!process.env.HANZO_API_KEY, 'length:', (process.env.HANZO_API_KEY||'').length);
            console.log('HOME:', process.env.HOME);
            const fs = require('fs');
            const authDir = '/home/node/.openclaw/agent';
            try {
              const files = fs.readdirSync(authDir);
              console.log('Auth dir files:', files);
              const ap = fs.readFileSync(authDir + '/auth-profiles.json', 'utf8');
              console.log('auth-profiles.json:', ap.substring(0,300));
            } catch(e) { console.log('Auth dir error:', e.message); }
          " 2>&1 || true

          echo ""
          echo "===== 10. Gateway health ====="
          kubectl exec -n hanzo deploy/cloud-agent -c cloud-agent -- curl -s http://bot-gateway:80/health 2>/dev/null || echo "Cannot reach"

          echo ""
          echo "===== 11. Internal WS test ====="
          kubectl exec -n hanzo deploy/cloud-agent -c cloud-agent -- timeout 5 node -e "
            const ws = new (require('ws'))('ws://bot-gateway:80/');
            ws.on('open', () => { console.log('WS OPEN'); ws.close(); process.exit(0); });
            ws.on('error', e => { console.log('WS ERROR:', e.message); process.exit(1); });
            setTimeout(() => { console.log('WS TIMEOUT'); process.exit(1); }, 4000);
          " 2>&1 || echo "WS test failed"

          echo ""
          echo "===== 12. gw.hanzo.bot ingress ====="
          kubectl get ingress -n hanzo bot-gateway-ws -o yaml 2>/dev/null || echo "NOT FOUND"

          echo ""
          echo "===== 13. ConfigMap ====="
          kubectl get cm -n hanzo bot-gateway-config -o jsonpath='{.data.bot\.json}' 2>/dev/null | python3 -m json.tool 2>/dev/null || echo "Cannot read"

          echo ""
          echo "===== 14. Secrets keys ====="
          echo -n "bot-secrets: " && kubectl get secret -n hanzo bot-secrets -o jsonpath='{.data}' 2>/dev/null | python3 -c "import sys,json; print(' '.join(json.loads(sys.stdin.read()).keys()))" 2>/dev/null || echo "n/a"
          echo -n "playground-secrets: " && kubectl get secret -n hanzo playground-secrets -o jsonpath='{.data}' 2>/dev/null | python3 -c "import sys,json; print(' '.join(json.loads(sys.stdin.read()).keys()))" 2>/dev/null || echo "n/a"

          echo ""
          echo "===== 15. Node registry ====="
          kubectl exec -n hanzo deploy/bot-gateway -c bot-gateway -- curl -s http://localhost:18789/__bot__/api/v1/nodes 2>/dev/null | head -200 || echo "Cannot get"

          echo ""
          echo "===== 16. Fix cloud-agent: restore command, add config volume, write auth ====="

          # 1. Restore original gateway command and add config volume mount
          kubectl patch deploy/cloud-agent -n hanzo --type=strategic -p '{"spec":{"template":{"spec":{"volumes":[{"name":"bot-config","configMap":{"name":"bot-gateway-config"}}],"containers":[{"name":"cloud-agent","command":["node","hanzo-bot.mjs","gateway","--allow-unconfigured","--bind","lan"],"volumeMounts":[{"name":"bot-config","mountPath":"/etc/bot/bot.json","subPath":"bot.json"}]}]}}}}' 2>&1 || echo "Patch failed"

          echo "=== Wait for rollout ==="
          kubectl rollout status deploy/cloud-agent -n hanzo --timeout=120s || true

          # 2. Write auth-profiles into ALL agent dirs in the running pod
          sleep 15
          kubectl exec -n hanzo deploy/cloud-agent -c cloud-agent -- node -e "
            const fs=require('fs');
            const path=require('path');
            const baseDir='/home/node/.openclaw/agents';
            const p={version:1,profiles:{'anthropic:default':{type:'api_key',provider:'anthropic',key:process.env.ANTHROPIC_API_KEY},'hanzo:default':{type:'api_key',provider:'hanzo',key:process.env.HANZO_API_KEY}},default:'anthropic:default'};
            const json=JSON.stringify(p);

            // Write to main/agent
            const mainDir=path.join(baseDir,'main','agent');
            fs.mkdirSync(mainDir,{recursive:true});
            fs.writeFileSync(path.join(mainDir,'auth-profiles.json'),json);
            console.log('Written to',mainDir);

            // Write to ALL existing per-agent dirs
            if(fs.existsSync(baseDir)){
              for(const entry of fs.readdirSync(baseDir)){
                const agentDir=path.join(baseDir,entry,'agent');
                if(fs.existsSync(agentDir)&&fs.statSync(agentDir).isDirectory()){
                  fs.writeFileSync(path.join(agentDir,'auth-profiles.json'),json);
                  console.log('Written to',agentDir);
                }
              }
            }
            console.log('ANTHROPIC key length:',process.env.ANTHROPIC_API_KEY?.length);
            const {execSync}=require('child_process');
            console.log(execSync('find /home/node/.openclaw -name auth-profiles.json').toString().trim());
          " 2>&1 || echo "Auth write failed"

          echo ""
          echo "===== 17. Fix bot-gateway: scale to 1, delete bad pods, restart Traefik ==="
          kubectl scale deploy/bot-gateway -n hanzo --replicas=1
          sleep 5
          # Delete any non-ready gateway pods
          kubectl get pods -n hanzo -l app=bot-gateway --no-headers | while read name ready status rest; do
            if [ "$ready" != "1/1" ]; then
              echo "Deleting non-ready: $name ($status)"
              kubectl delete pod -n hanzo "$name" --grace-period=0 --force 2>/dev/null || true
            fi
          done
          sleep 5
          echo "Gateway pods after fix:"
          kubectl get pods -n hanzo -l app=bot-gateway
          echo ""
          echo "=== Nuclear fix: delete and recreate gw.hanzo.bot cert + ingress ==="
          kubectl delete secret gw-hanzo-bot-tls -n hanzo 2>/dev/null || true
          kubectl delete ingress bot-gateway-ws -n hanzo 2>/dev/null || true
          kubectl delete certificate gw-hanzo-bot-tls -n hanzo 2>/dev/null || true
          sleep 5

          # Create fresh self-signed cert
          openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
            -keyout /tmp/tls.key -out /tmp/tls.crt \
            -subj "/CN=gw.hanzo.bot" -addext "subjectAltName=DNS:gw.hanzo.bot" 2>/dev/null
          kubectl create secret tls gw-hanzo-bot-tls -n hanzo \
            --cert=/tmp/tls.crt --key=/tmp/tls.key
          echo "Created fresh self-signed cert"

          echo "=== Apply gw.hanzo.bot ingress with TLS ==="
          kubectl apply -f - <<'GWEOF'
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: bot-gateway-ws
            namespace: hanzo
            labels:
              app: bot-gateway
          spec:
            ingressClassName: gateway
            tls:
              - hosts:
                  - gw.hanzo.bot
                secretName: gw-hanzo-bot-tls
            rules:
              - host: gw.hanzo.bot
                http:
                  paths:
                    - path: /
                      pathType: Prefix
                      backend:
                        service:
                          name: bot-gateway
                          port:
                            number: 80
          GWEOF
          echo ""
          echo "=== Delete conflicting nginx ingresses and restart Traefik ==="
          # Delete old nginx-class bot-gateway ingress that conflicts
          for ing in bot-gateway; do
            CLASS=$(kubectl get ingress -n hanzo "$ing" -o jsonpath='{.spec.ingressClassName}' 2>/dev/null || echo "")
            if [ "$CLASS" = "ingress" ] || [ -z "$CLASS" ]; then
              echo "Deleting conflicting ingress $ing (class=$CLASS)"
              kubectl delete ingress -n hanzo "$ing" --wait=false 2>/dev/null || true
            fi
          done
          # Restart Traefik to pick up route changes
          kubectl rollout restart daemonset/hanzo-ingress -n hanzo 2>/dev/null || true
          sleep 15
          echo "Traefik restarted"

          echo ""
          echo "===== 18. SKIP gateway recreate (already done) ==="
          kubectl delete deploy/bot-gateway -n hanzo --wait=true 2>/dev/null || true
          sleep 5

          # Apply fresh from universe (checkout sparse)
          git clone --depth=1 --filter=blob:none --sparse https://$GH_TOKEN@github.com/hanzoai/universe.git /tmp/universe 2>/dev/null
          cd /tmp/universe && git sparse-checkout set infra/k8s/bot && cd -
          kubectl apply -f /tmp/universe/infra/k8s/bot/deployment.yaml
          kubectl rollout status deploy/bot-gateway -n hanzo --timeout=180s || true

          echo "=== Gateway pods ==="
          kubectl get pods -n hanzo -l app=bot-gateway -o wide

          echo "=== Gateway health ==="
          sleep 10
          kubectl exec -n hanzo deploy/bot-gateway -c bot-gateway -- curl -s http://localhost:18789/health 2>/dev/null || echo "Not healthy yet"

          echo "=== ANTHROPIC_API_KEY check ==="
          kubectl exec -n hanzo deploy/bot-gateway -c bot-gateway -- node -e "console.log('ANTHROPIC_API_KEY length:', (process.env.ANTHROPIC_API_KEY||'').length)" 2>/dev/null || echo "Cannot check"

          echo ""
          echo "===== 18. Playground provisioned pods ====="
          kubectl get pods -n hanzo -l 'app.kubernetes.io/managed-by=hanzo-playground' -o wide 2>/dev/null || true
          kubectl get pods -n hanzo | grep -E 'cloud-|agent-cloud' || true
