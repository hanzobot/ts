name: K8s Debug
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"
      - name: Fix app.hanzo.bot routing
        run: |
          echo "=== 1. Check TLS certs ==="
          kubectl get secret app-hanzo-bot-tls -n hanzo 2>/dev/null && echo "EXISTS" || echo "MISSING"
          kubectl get secret playground-hanzo-bot-tls -n hanzo 2>/dev/null && echo "EXISTS" || echo "MISSING"
          kubectl get certificate -n hanzo 2>/dev/null | grep -E "app-hanzo|playground-hanzo" || echo "No certificates found"

          echo ""
          echo "=== 2. Check cert-manager challenges ==="
          kubectl get challenges -n hanzo 2>/dev/null | head -10 || echo "No challenges"

          echo ""
          echo "=== 3. Delete conflicting hanzo-bot-site ingress (conflicts with playground) ==="
          kubectl get ingress hanzo-bot-site -n hanzo -o jsonpath='{.spec.rules[*].host}' 2>/dev/null && echo ""
          # Don't delete yet, let's check what hosts it has

          echo ""
          echo "=== 4. Fix: Recreate hanzo-playground ingress without TLS ==="
          echo "Cloudflare handles SSL termination, so k8s ingress doesn't need TLS"
          kubectl delete ingress hanzo-playground -n hanzo --ignore-not-found
          cat <<'EOF' | kubectl apply -f -
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: hanzo-playground
            namespace: hanzo
            labels:
              app: hanzo-playground
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
          spec:
            ingressClassName: gateway
            tls:
            - hosts:
              - app.hanzo.bot
              secretName: app-hanzo-bot-tls
            - hosts:
              - playground.hanzo.bot
              secretName: playground-hanzo-bot-tls
            rules:
            - host: app.hanzo.bot
              http:
                paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: hanzo-playground
                      port:
                        number: 8080
            - host: playground.hanzo.bot
              http:
                paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: hanzo-playground
                      port:
                        number: 8080
          EOF

          echo ""
          echo "=== 5. Also delete the custom IngressRoute (may conflict) ==="
          kubectl delete ingressroute app-hanzo-bot -n hanzo --ignore-not-found 2>/dev/null || echo "IngressRoute delete skipped"

          echo ""
          echo "=== 6. Check Traefik namespace and pods ==="
          kubectl get pods -A -o wide 2>/dev/null | grep -i traefik | head -5

          echo ""
          echo "=== 7. Test direct routing ==="
          sleep 3
          echo "Test app.hanzo.bot:"
          curl -skI -H "Host: app.hanzo.bot" "https://64.225.91.229/" 2>&1 | head -5
          echo ""
          echo "Test playground.hanzo.bot:"
          curl -skI -H "Host: playground.hanzo.bot" "https://64.225.91.229/" 2>&1 | head -5
          echo ""
          echo "Test app.hanzo.bot/api/v1/health:"
          curl -sk -H "Host: app.hanzo.bot" "https://64.225.91.229/api/v1/health" 2>&1 | head -3
