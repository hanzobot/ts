name: K8s Debug
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"
      - name: Fix service selector mismatch
        run: |
          echo "=== Current service selector ==="
          kubectl get svc bot-gateway -n hanzo -o jsonpath='{.spec.selector}' && echo ""

          echo ""
          echo "=== Fix: Delete and recreate service with correct selector ==="
          kubectl delete svc bot-gateway -n hanzo --ignore-not-found

          cat <<'SVCEOF' | kubectl apply -f -
          apiVersion: v1
          kind: Service
          metadata:
            name: bot-gateway
            namespace: hanzo
          spec:
            selector:
              app: bot-gateway
            sessionAffinity: ClientIP
            sessionAffinityConfig:
              clientIP:
                timeoutSeconds: 3600
            ports:
            - name: http
              port: 80
              targetPort: 18789
            - name: ws
              port: 18790
              targetPort: 18790
          SVCEOF

          echo ""
          echo "=== New service ==="
          kubectl get svc bot-gateway -n hanzo -o wide
          kubectl get svc bot-gateway -n hanzo -o jsonpath='{.spec.selector}' && echo ""

          echo ""
          echo "=== Wait for endpoints ==="
          sleep 5
          kubectl get endpoints bot-gateway -n hanzo

          echo ""
          echo "=== Health check via service ==="
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 "http://bot-gateway:80/health" 2>&1 | head -5 || echo "Service check failed"

          echo ""
          echo "=== Test WebSocket upgrade path ==="
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 "http://bot-gateway:80/__bot__/" 2>&1 | head -5 || echo "Control UI path check failed"
