name: K8s Debug
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"
      - name: Check config mounting
        run: |
          echo "=== BOT_CONFIG_PATH env ==="
          kubectl exec -n hanzo deploy/bot-gateway -- env 2>&1 | grep BOT_CONFIG || echo "BOT_CONFIG_PATH not set"

          echo ""
          echo "=== Cat config file ==="
          kubectl exec -n hanzo deploy/bot-gateway -- cat /etc/bot/bot.json 2>&1 | head -20 || echo "Config file not found"

          echo ""
          echo "=== Volume mounts ==="
          kubectl get deploy bot-gateway -n hanzo -o jsonpath='{.spec.template.spec.containers[0].volumeMounts}' 2>&1

          echo ""
          echo "=== Volumes ==="
          kubectl get deploy bot-gateway -n hanzo -o jsonpath='{.spec.template.spec.volumes}' 2>&1
