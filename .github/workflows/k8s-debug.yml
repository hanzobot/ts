name: K8s Debug
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"

      - name: Investigate tunnel timeout
        run: |
          echo "=== 1. Gateway logs - tunnel related ==="
          kubectl logs -n hanzo -l app=bot-gateway --tail=50 2>&1 | grep -iE "tunnel|vnc|connect|node|9c1519|1a606|cloud" | head -20

          echo ""
          echo "=== 2. All cloud agent pods ==="
          kubectl get pods -n hanzo | grep -iE "cloud\|agent" | head -15

          echo ""
          echo "=== 3. Check if agent-cloud-9c1519a7 is a registered node ==="
          # The node ID format used by playground
          kubectl get pods -n hanzo -o wide | grep -iE "9c1519\|1a606\|cloud-865" | head -10

          echo ""
          echo "=== 4. Cloud-agent (our static one) - does it have VNC? ==="
          kubectl get deploy cloud-agent -n hanzo -o jsonpath='{.spec.template.spec.containers[*].name}' && echo ""
          echo "Containers count: $(kubectl get deploy cloud-agent -n hanzo -o jsonpath='{.spec.template.spec.containers}' | python3 -c 'import sys,json; print(len(json.loads(sys.stdin.read())))' 2>/dev/null)"

          echo ""
          echo "=== 5. Gateway full logs last 30 lines ==="
          kubectl logs -n hanzo -l app=bot-gateway --tail=30 2>&1 | head -35

          echo ""
          echo "=== 6. Cloud-agent logs ==="
          kubectl logs -n hanzo -l app=cloud-agent --tail=20 2>&1 | head -25

          echo ""
          echo "=== 7. Operative pod status ==="
          kubectl get pods -n hanzo -l app=operative -o wide
          kubectl get deploy operative -n hanzo

          echo ""
          echo "=== 8. All playground-managed agent pods ==="
          kubectl get pods -n hanzo -o wide --show-labels | grep -iE "agent-cloud\|bot-node\|node-cloud" | head -10

          echo ""
          echo "=== 9. Playground API - list nodes ==="
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 "http://hanzo-playground:8080/api/v1/nodes" 2>&1 | python3 -c "
          import sys, json
          try:
            data = json.loads(sys.stdin.read())
            nodes = data if isinstance(data, list) else data.get('nodes', data.get('data', []))
            for n in (nodes[:10] if isinstance(nodes, list) else []):
              print(f'  {n.get(\"id\",\"?\")}: status={n.get(\"status\",\"?\")} type={n.get(\"type\",\"?\")} connected={n.get(\"connected\",\"?\")}')
          except Exception as e:
            print(f'Parse error: {e}')
            print(sys.stdin.read()[:200] if hasattr(sys.stdin, 'read') else '')
          " 2>&1 | head -15
