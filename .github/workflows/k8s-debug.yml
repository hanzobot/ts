name: K8s Debug
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"
      - name: Fix bot-gateway bind with correct command
        run: |
          echo "=== Patch to: node openclaw.mjs gateway --bind lan --allow-unconfigured ==="
          kubectl patch deploy bot-gateway -n hanzo --type json \
            -p '[{"op":"replace","path":"/spec/template/spec/containers/0/command","value":["node","openclaw.mjs","gateway","--bind","lan","--allow-unconfigured"]}]'

          echo ""
          echo "=== Scale down and up for clean start ==="
          kubectl scale deploy/bot-gateway -n hanzo --replicas=0
          sleep 5
          kubectl scale deploy/bot-gateway -n hanzo --replicas=1
          kubectl rollout status deploy/bot-gateway -n hanzo --timeout=180s || echo "Timed out (bot takes long to start)"

          echo ""
          echo "=== Check logs for bind address ==="
          kubectl logs -n hanzo -l app=bot-gateway --tail=10 2>&1 | grep -iE "listen|bind|0\.0\.0\.0|lan" || echo "Not ready yet"

          echo ""
          echo "=== Test port 80 ==="
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 "http://bot-gateway:80/" 2>&1 | head -3 || echo "Port 80 not ready"
