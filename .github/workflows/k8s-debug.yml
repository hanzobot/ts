name: K8s Debug
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"

      - name: Fix pre-puller and verify everything
        run: |
          echo "=== 1. Fix pre-puller DaemonSet ==="
          kubectl delete ds image-prepull -n hanzo --ignore-not-found
          OPERATIVE_SHA="ghcr.io/hanzoai/operative@sha256:9a442ddd2eed95840b6f29a57d961ad63b831823a25eb41d4c9b7efcc1cf183c"
          cat <<DSEOF | kubectl apply -f -
          apiVersion: apps/v1
          kind: DaemonSet
          metadata:
            name: image-prepull
            namespace: hanzo
          spec:
            selector:
              matchLabels:
                app: image-prepull
            template:
              metadata:
                labels:
                  app: image-prepull
              spec:
                imagePullSecrets:
                - name: ghcr-secret
                initContainers:
                - name: pull-operative
                  image: $OPERATIVE_SHA
                  imagePullPolicy: IfNotPresent
                  command: ["sh", "-c", "echo operative-cached"]
                - name: pull-bot
                  image: ghcr.io/hanzoai/bot:latest
                  imagePullPolicy: IfNotPresent
                  command: ["sh", "-c", "echo bot-cached"]
                containers:
                - name: idle
                  image: busybox:1.36
                  command: ["sleep", "infinity"]
                  resources:
                    requests:
                      cpu: 1m
                      memory: 4Mi
                    limits:
                      cpu: 10m
                      memory: 16Mi
          DSEOF

          echo ""
          echo "=== 2. Verify cloud-agent 2/2 Running ==="
          kubectl get pods -n hanzo -l app=cloud-agent -o wide

          echo ""
          echo "=== 3. Gateway health ==="
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 "http://bot-gateway:80/health" 2>&1 | head -3

          echo ""
          echo "=== 4. App.hanzo.bot health ==="
          curl -sk -H "Host: app.hanzo.bot" "https://64.225.91.229/api/v1/health" 2>&1 | head -3

          echo ""
          echo "=== 5. WS test ==="
          curl -skI -H "Host: gw.hanzo.bot" -H "Upgrade: websocket" -H "Connection: Upgrade" -H "Sec-WebSocket-Version: 13" -H "Sec-WebSocket-Key: dGhlIHNhbXBsZSBub25jZQ==" "https://64.225.91.229/" 2>&1 | head -5

          echo ""
          echo "=== 6. Remaining playground nodes ==="
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 "http://hanzo-playground:8080/api/v1/nodes" 2>&1 | python3 -c "
          import sys, json
          data = json.loads(sys.stdin.read())
          nodes = data if isinstance(data, list) else data.get('nodes', data.get('data', []))
          print(f'Total: {len(nodes)}')
          for n in nodes:
            print(f'  {n.get(\"id\",\"?\")}: status={n.get(\"status\",\"?\")} connected={n.get(\"connected\",\"?\")}')
          " 2>/dev/null

          echo ""
          echo "=== 7. Pre-puller status ==="
          sleep 5
          kubectl get ds image-prepull -n hanzo
