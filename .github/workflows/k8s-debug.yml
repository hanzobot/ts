name: K8s Debug
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"
      - name: Fix bot-gateway entrypoint and apply ConfigMap
        run: |
          echo "=== Fix command: openclaw.mjs (not hanzo-bot.mjs) with --bind lan ==="
          kubectl patch deploy bot-gateway -n hanzo --type json \
            -p '[{"op":"replace","path":"/spec/template/spec/containers/0/command","value":["node","openclaw.mjs","gateway","--allow-unconfigured","--bind","lan"]}]'

          echo ""
          echo "=== Ensure ConfigMap exists ==="
          kubectl get configmap bot-gateway-config -n hanzo 2>/dev/null && echo "ConfigMap exists" || echo "ConfigMap missing - creating"

          echo ""
          echo "=== Scale 0 then 1 ==="
          kubectl scale deploy/bot-gateway -n hanzo --replicas=0
          sleep 5
          kubectl scale deploy/bot-gateway -n hanzo --replicas=1

          echo ""
          echo "=== Wait up to 5 min ==="
          kubectl rollout status deploy/bot-gateway -n hanzo --timeout=300s || echo "Timed out"

          echo ""
          echo "=== Check logs ==="
          kubectl logs -n hanzo -l app=bot-gateway --tail=5 2>&1 | grep -iE "listen|bind|0\.0\.0\.0|lan|error" || echo "Check later"

          echo ""
          echo "=== Test port 80 ==="
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 "http://bot-gateway:80/health" 2>&1 | head -3 || echo "Not ready yet"
