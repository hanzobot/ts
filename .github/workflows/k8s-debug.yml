name: K8s Debug
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"
      - name: Fix BOT_CONFIG_PATH and restart
        run: |
          echo "=== Add BOT_CONFIG_PATH env var ==="
          kubectl set env deploy/bot-gateway -n hanzo "BOT_CONFIG_PATH=/etc/bot/bot.json"

          echo ""
          echo "=== Restart ==="
          kubectl scale deploy/bot-gateway -n hanzo --replicas=0
          sleep 10
          kubectl scale deploy/bot-gateway -n hanzo --replicas=1
          kubectl rollout status deploy/bot-gateway -n hanzo --timeout=300s || echo "Timed out"

          echo ""
          echo "=== Check logs ==="
          kubectl logs -n hanzo -l app=bot-gateway --tail=5 2>&1 | grep -iE "listen|bind|0\.0\.0\.0|lan|error|fatal|config" | head -5 || echo "Check later"

          echo ""
          echo "=== Test ==="
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 "http://bot-gateway:80/health" 2>&1 | head -3 || echo "Not ready"

          echo ""
          echo "=== Test via Traefik ==="
          curl -sk --connect-timeout 5 --resolve "gw.hanzo.bot:443:64.225.91.229" "https://gw.hanzo.bot/health" -D - 2>&1 | head -5
