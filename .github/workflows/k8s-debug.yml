name: K8s Debug
on:
  workflow_dispatch:
permissions:
  contents: read
env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f
jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"
      - name: Debug nginx ingress for bot WebSocket
        run: |
          echo "=== All pods with 'nginx' or 'ingress' ==="
          kubectl get pods --all-namespaces 2>/dev/null | grep -iE "nginx|ingress" || echo "None found"

          echo ""
          echo "=== All namespaces ==="
          kubectl get ns 2>/dev/null

          echo ""
          echo "=== Ingress classes ==="
          kubectl get ingressclass 2>/dev/null || echo "No ingress classes"

          echo ""
          echo "=== All LB services with IPs ==="
          kubectl get svc --all-namespaces --field-selector spec.type=LoadBalancer -o custom-columns='NS:.metadata.namespace,NAME:.metadata.name,IP:.status.loadBalancer.ingress[0].ip' 2>/dev/null

          echo ""
          echo "=== Pods in ingress-nginx namespace ==="
          kubectl get pods -n ingress-nginx 2>/dev/null || echo "No ingress-nginx namespace"

          echo ""
          echo "=== hanzo-playground service ==="
          kubectl get svc -n hanzo 2>/dev/null | grep -i playground || echo "No playground service"

          echo ""
          echo "=== Deployments with 'nginx' ==="
          kubectl get deploy --all-namespaces 2>/dev/null | grep -i nginx || echo "No nginx deployments"

          echo ""
          echo "=== Helm releases (nginx) ==="
          kubectl get helmrelease --all-namespaces 2>/dev/null | grep -i nginx || echo "No helm releases"
