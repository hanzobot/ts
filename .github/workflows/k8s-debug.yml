name: K8s Debug
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"
      - name: Check bot ecosystem status
        run: |
          echo "=== Bot gateway pods ==="
          kubectl get pods -n hanzo -l app=bot-gateway -o wide

          echo ""
          echo "=== Cloud agent pods ==="
          kubectl get pods -n hanzo -l app=cloud-agent -o wide 2>/dev/null || echo "No cloud-agent pods"
          kubectl get deploy cloud-agent -n hanzo 2>/dev/null || echo "No cloud-agent deployment"

          echo ""
          echo "=== All bot-related deployments ==="
          kubectl get deploy -n hanzo | grep -iE "bot|agent|cloud|operative|playground"

          echo ""
          echo "=== Playground pods ==="
          kubectl get pods -n hanzo -l app=hanzo-playground -o wide 2>/dev/null || echo "No playground pods"

          echo ""
          echo "=== Cloud agent logs ==="
          kubectl logs -n hanzo -l app=cloud-agent --tail=30 2>&1 | head -40 || echo "No cloud-agent logs"

          echo ""
          echo "=== Gateway connected nodes ==="
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 "http://bot-gateway:80/__bot__/api/nodes" 2>&1 | head -20 || echo "Nodes API failed"

          echo ""
          echo "=== Gateway tunnel status ==="
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 "http://bot-gateway:80/health" 2>&1 | head -5

          echo ""
          echo "=== Operative pods ==="
          kubectl get pods -n hanzo -l app=operative -o wide 2>/dev/null || echo "No operative pods"
          kubectl logs -n hanzo -l app=operative --tail=10 2>&1 | head -15 || echo "No operative logs"

          echo ""
          echo "=== Playground logs ==="
          kubectl logs -n hanzo -l app=hanzo-playground --tail=20 2>&1 | head -30 || echo "No playground logs"
