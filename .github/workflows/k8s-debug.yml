name: K8s Debug
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"
      - name: Check status only - DO NOT modify
        run: |
          echo "=== Pod status ==="
          kubectl get pods -n hanzo -l app=cloud-agent -o wide

          echo ""
          echo "=== Describe events ==="
          kubectl describe pod -n hanzo -l app=cloud-agent 2>&1 | grep -E "Events:|Normal|Warning" | head -10

          echo ""
          echo "=== If running, check logs ==="
          kubectl logs -n hanzo -l app=cloud-agent -c cloud-agent --tail=10 2>&1 | head -15 || true
          echo "---"
          kubectl logs -n hanzo -l app=cloud-agent -c operative --tail=3 2>&1 | head -5 || true
