name: K8s Debug
on:
  workflow_dispatch:
permissions:
  contents: read
env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f
jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - run: doctl kubernetes cluster kubeconfig save "$HANZO_CLUSTER_ID"
      - name: Full diagnostic
        run: |
          echo "===== 1. ALL BOT PODS ====="
          kubectl get pods -n hanzo | grep -iE "bot-gateway|cloud-agent|operative|playground"

          echo ""
          echo "===== 2. GATEWAY LOGS (last 10) ====="
          kubectl logs -n hanzo -l app=bot-gateway --tail=10 2>&1 | head -15

          echo ""
          echo "===== 3. CLOUD-AGENT LOGS ====="
          kubectl logs -n hanzo -l app=cloud-agent -c cloud-agent --tail=10 2>&1 | head -15

          echo ""
          echo "===== 4. GATEWAY HEALTH ====="
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 "http://bot-gateway:80/health" 2>&1

          echo ""
          echo "===== 5. EXTERNAL WS TEST ====="
          timeout 3 curl -sNi -k -H "Host: gw.hanzo.bot" -H "Upgrade: websocket" -H "Connection: Upgrade" -H "Sec-WebSocket-Version: 13" -H "Sec-WebSocket-Key: dGhlIHNhbXBsZSBub25jZQ==" "https://64.225.91.229/" 2>&1 | head -5 || echo "done"

          echo ""
          echo "===== 6. PLAYGROUND NODES IN DB ====="
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 "http://hanzo-playground:8080/api/v1/nodes" 2>&1 | python3 -c "
          import sys, json
          data = json.loads(sys.stdin.read())
          nodes = data if isinstance(data, list) else data.get('nodes', data.get('data', []))
          print(f'Total nodes in DB: {len(nodes)}')
          for n in nodes:
            print(f'  {n.get(\"id\",\"?\")}: status={n.get(\"status\",\"?\")} type={n.get(\"type\",\"?\")}')
          " 2>/dev/null

          echo ""
          echo "===== 7. DELETE ALL STALE NODES FROM DB ====="
          NODES_JSON=$(kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 "http://hanzo-playground:8080/api/v1/nodes" 2>/dev/null)
          echo "$NODES_JSON" | python3 -c "
          import sys, json
          data = json.loads(sys.stdin.read())
          nodes = data if isinstance(data, list) else data.get('nodes', data.get('data', []))
          for n in nodes:
            print(n.get('id', ''))
          " 2>/dev/null | while read NODE_ID; do
            if [ -n "$NODE_ID" ]; then
              echo "Deleting: $NODE_ID"
              kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 --method=DELETE "http://hanzo-playground:8080/api/v1/nodes/$NODE_ID" 2>&1 | head -1
            fi
          done

          echo ""
          echo "===== 8. VERIFY NODES AFTER CLEANUP ====="
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 "http://hanzo-playground:8080/api/v1/nodes" 2>&1 | python3 -c "
          import sys, json
          data = json.loads(sys.stdin.read())
          nodes = data if isinstance(data, list) else data.get('nodes', data.get('data', []))
          print(f'Remaining nodes: {len(nodes)}')
          for n in nodes:
            print(f'  {n.get(\"id\",\"?\")}')
          " 2>/dev/null
