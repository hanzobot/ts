name: K8s Debug
on:
  workflow_dispatch:
permissions:
  contents: read
env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f
jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - run: doctl kubernetes cluster kubeconfig save "$HANZO_CLUSTER_ID"
      - name: Delete stale nodes via correct API + direct DB
        run: |
          echo "===== 1. List spaces ====="
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 "http://hanzo-playground:8080/api/v1/spaces" 2>&1 | python3 -m json.tool 2>/dev/null | head -20

          echo ""
          echo "===== 2. List nodes in default space ====="
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 "http://hanzo-playground:8080/api/v1/spaces/default/bots" 2>&1 | python3 -m json.tool 2>/dev/null | head -30

          echo ""
          echo "===== 3. Try cloud delete API ====="
          for NODE_ID in cloud-b0bb6d83 cloud-a429c34d cloud-4cc75086 cloud-88dfa2c1 cloud-b06b2c1 team-sec team-vi team-dev team-des team-opera; do
            echo -n "DELETE cloud/$NODE_ID: "
            kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 --method=DELETE "http://hanzo-playground:8080/api/v1/cloud/nodes/$NODE_ID" 2>&1 | head -1
          done

          echo ""
          echo "===== 4. Try space delete API ====="
          for NODE_ID in cloud-b0bb6d83 cloud-a429c34d cloud-4cc75086 cloud-88dfa2c1 cloud-b06b2c1 team-sec team-vi team-dev team-des team-opera hanzo-bot-gateway; do
            echo -n "DELETE space/default/$NODE_ID: "
            kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 --method=DELETE "http://hanzo-playground:8080/api/v1/spaces/default/nodes/$NODE_ID" 2>&1 | head -1
          done

          echo ""
          echo "===== 5. Direct DB cleanup (nuclear option) ====="
          # Get postgres DSN
          PG_DSN=$(kubectl get secret playground-secrets -n hanzo -o jsonpath='{.data.POSTGRES_DSN}' | base64 -d)
          echo "DB accessible: $([ -n "$PG_DSN" ] && echo yes || echo no)"
          if [ -n "$PG_DSN" ]; then
            echo "Tables:"
            kubectl exec -n hanzo deploy/hanzo-playground -- /bin/sh -c "echo 'SELECT tablename FROM pg_tables WHERE schemaname='\''public'\''' | timeout 5 psql '$PG_DSN' -t" 2>/dev/null | head -10 || echo "psql not available in container"
          fi

          echo ""
          echo "===== 6. Remaining nodes check ====="
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 "http://hanzo-playground:8080/api/v1/nodes" 2>&1 | python3 -c "
          import sys, json
          data = json.loads(sys.stdin.read())
          nodes = data if isinstance(data, list) else data.get('nodes', data.get('data', []))
          print(f'Remaining: {len(nodes)}')
          for n in nodes:
            print(f'  {n.get(\"id\",\"?\")}')
          " 2>/dev/null
