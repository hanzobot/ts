name: K8s Debug
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"
      - name: Check routing for app.hanzo.bot and hanzo.bot
        run: |
          echo "=== All ingresses with hanzo.bot hosts ==="
          kubectl get ingress -A -o wide 2>&1 | grep -iE "NAME|hanzo\.bot|app\.hanzo"

          echo ""
          echo "=== Detailed ingress rules for hanzo.bot ==="
          kubectl get ingress -n hanzo -o yaml 2>&1 | grep -B5 -A10 "hanzo\.bot"

          echo ""
          echo "=== All IngressRoutes (Traefik CRDs) ==="
          kubectl get ingressroute -A 2>/dev/null || echo "No IngressRoute CRD"
          kubectl get ingressroute -A -o yaml 2>/dev/null | grep -B5 -A15 "hanzo\.bot" || true

          echo ""
          echo "=== Check what Traefik sees for app.hanzo.bot ==="
          kubectl get ingressroute -A -o yaml 2>/dev/null | grep -B5 -A15 "app\.hanzo" || echo "No app.hanzo.bot IngressRoute"

          echo ""
          echo "=== Bot hub deployment and service ==="
          kubectl get deploy hanzo-bot-site -n hanzo
          kubectl get svc hanzo-bot-site -n hanzo

          echo ""
          echo "=== Direct test: app.hanzo.bot through ingress ==="
          # Test from inside cluster what the bot-hub returns
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 "http://hanzo-bot-site/playground" 2>&1 | head -5 || echo "Bot site /playground failed"

          echo ""
          echo "=== Test playground service directly ==="
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 "http://hanzo-playground:8080/" 2>&1 | head -10 || echo "Playground service failed"

          echo ""
          echo "=== Bot-gateway ConfigMap verify ==="
          kubectl get configmap bot-gateway-config -n hanzo -o jsonpath='{.data.bot\.json}' 2>&1 | head -30

          echo ""
          echo "=== Gateway logs (last 5 lines) ==="
          kubectl logs -n hanzo -l app=bot-gateway --tail=5 2>&1 | head -10
