name: K8s Debug
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"
      - name: Fix bot-gateway bind
        run: |
          echo "=== Patch container command to include --bind lan ==="
          kubectl patch deploy bot-gateway -n hanzo --type json \
            -p '[{"op":"replace","path":"/spec/template/spec/containers/0/command","value":["openclaw","--bind","lan"]}]'

          echo ""
          echo "=== Wait for rollout ==="
          kubectl rollout status deploy/bot-gateway -n hanzo --timeout=120s || echo "Timed out"

          echo ""
          echo "=== Check new logs ==="
          sleep 10
          kubectl logs -n hanzo -l app=bot-gateway --tail=5 2>&1 | grep -i "listen\|bind" || echo "No listen/bind in logs yet"

          echo ""
          echo "=== Test connectivity ==="
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 "http://bot-gateway:80/" 2>&1 | head -3 || echo "Port 80 still failing"

          echo ""
          echo "=== Test via Traefik ==="
          curl -sk --connect-timeout 5 --resolve "gw.hanzo.bot:443:64.225.91.229" "https://gw.hanzo.bot/" -D - 2>&1 | head -8
