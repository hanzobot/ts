name: K8s Debug
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save "${{ env.HANZO_CLUSTER_ID }}"

      - name: Deploy new playground image and full status
        run: |
          echo "=== 1. Restart playground with latest image ==="
          kubectl rollout restart deploy/hanzo-playground -n hanzo
          kubectl rollout status deploy/hanzo-playground -n hanzo --timeout=120s || echo "Timed out"

          echo ""
          echo "=== 2. Verify playground has ANTHROPIC_API_KEY ==="
          sleep 5
          POD=$(kubectl get pods -n hanzo -l app=hanzo-playground -o jsonpath='{.items[0].metadata.name}')
          kubectl exec -n hanzo "$POD" -- env 2>/dev/null | grep -E "ANTHROPIC" | sed 's/=.\{8\}.*/=<set>/' || echo "Not found"

          echo ""
          echo "=== 3. All services health ==="
          echo "Gateway:"
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 "http://bot-gateway:80/health" 2>&1 | head -3
          echo ""
          echo "Playground:"
          kubectl exec -n hanzo deploy/console -- wget -q -O - --timeout=5 "http://hanzo-playground:8080/api/v1/health" 2>&1 | head -3

          echo ""
          echo "=== 4. Cloud-agent status ==="
          kubectl get pods -n hanzo -l app=cloud-agent -o wide
          kubectl logs -n hanzo -l app=cloud-agent -c cloud-agent --tail=5 2>&1 | head -8

          echo ""
          echo "=== 5. Pre-puller DaemonSet status ==="
          kubectl get ds image-prepull -n hanzo 2>/dev/null || echo "No pre-puller"

          echo ""
          echo "=== 6. External endpoints ==="
          echo "app.hanzo.bot:"
          curl -skI -H "Host: app.hanzo.bot" "https://64.225.91.229/" 2>&1 | head -3
          echo "gw.hanzo.bot WS:"
          timeout 3 curl -sNi -k -H "Host: gw.hanzo.bot" -H "Upgrade: websocket" -H "Connection: Upgrade" -H "Sec-WebSocket-Version: 13" -H "Sec-WebSocket-Key: dGhlIHNhbXBsZSBub25jZQ==" "https://64.225.91.229/" 2>&1 | head -3 || true
